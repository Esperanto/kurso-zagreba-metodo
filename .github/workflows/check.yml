name: Check

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run smoke test
        run: make check
