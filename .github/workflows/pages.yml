name: Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: make install

      - name: Build HTML
        run: make html-all

      - name: Configure custom domain
        run: printf '%s\n' 'stg.esperanto12.net' > html_generiloj/output/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: html_generiloj/output
          retention-days: 14

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
