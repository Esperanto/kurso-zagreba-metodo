"01":
  alt: Junulo sidas ĉe skribotablo kaj skribas en kajero apud tekkomputilo, kun afiŝoj kaj bretoj malantaŭ li.
"02":
  alt: Junulo montras kuirejon al junulino, kiu staras ĉe pordo kun libroj en la brakoj.
"03":
  alt: Junulo kaj junulino sidas ĉe tablo en kafejo kun trinkaĵoj, dum aliaj homoj sidas fone.
"04":
  alt: Virino riproĉas malĝojan knabinon, kiu tenas paperon en dormoĉambro kun etaĝlito kaj ludbestoj.
"05":
  alt: Vendisto parolas kun viro en aŭtosalonego, dum oficistino sidas ĉe komputilo kaj aŭtoj staras ĉirkaŭe.
"06":
  alt: Kuracisto ekzamenas knabinon en lito, dum virino staras apud ŝi en infana ĉambro.
"07":
  alt: Junulo kuras al konstruaĵo kun verda stelo sur ŝildo, portante dorsosakon.
"08":
  alt: Lernanto dormetas super libroj kaj revas pri futbala matĉo.
"09":
  alt: Viro kaj infano sidas en ruĝa aŭto antaŭ domo, kaj la infano salutas tra la antaŭa vitro.
"10":
  alt: Grupo de amikoj staras kaj sidas en salono kun plantoj kaj trinkaĵoj.
"11":
  alt: Du viroj interparolas sur placo en Venecio apud turo kaj kolono, dum aliaj homoj promenas.
"12":
  alt: Du policanoj haltigas viron kun levitaj manoj en arbaro.
