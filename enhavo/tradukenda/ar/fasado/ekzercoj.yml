Alklaku la vortojn por vidi ilian tradukon.: انقر على الكلمات لرؤية ترجمتها.
Forigu: امسح
Kompletigu la frazojn: أكمل الجمل
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'يمكنك أيضاً كتابة حروف الإسبرانتو ذات العلامات هكذا: cx و gx و hx و jx و sx و ux.'
Solvu: حلّ
Traduku: ترجم
Traduku kaj respondu: ترجم وأجب
