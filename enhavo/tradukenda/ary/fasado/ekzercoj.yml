Alklaku la vortojn por vidi ilian tradukon.: كليكي على الكلمات باش تشوف الترجمة ديالهم.
Forigu: مسح
Kompletigu la frazojn: كمل الجمل
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'تقدر حتى تكتب حروف الاسبرانتو هكا: cx و gx و hx و jx و sx و ux.'
Solvu: حل
Traduku: ترجم
Traduku kaj respondu: ترجم وجاوب
