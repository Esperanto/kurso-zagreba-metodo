Alklaku la vortojn por vidi ilian tradukon.: অনুবাদ দেখতে শব্দগুলিতে ক্লিক করুন।
Forigu: মুছুন
Kompletigu la frazojn: বাক্যগুলি সম্পূর্ণ করুন
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: এস্পেরান্তো অক্ষরগুলির বদলে cx, gx, hx, jx, sx
  এবং ux-ও লেখা যায়।
Solvu: সমাধান করুন
Traduku: অনুবাদ করুন
Traduku kaj respondu: অনুবাদ করুন এবং উত্তর দিন
