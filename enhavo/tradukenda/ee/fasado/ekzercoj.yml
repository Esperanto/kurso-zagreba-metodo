Alklaku la vortojn por vidi ilian tradukon.: Tẹ àwọn ọ̀rọ̀ náà láti rí ìtumọ̀ wọn.
Forigu: Pa rẹ́
Kompletigu la frazojn: Parí àwọn gbólóhùn náà
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'O tún lè kọ àwọn lẹ́tà Esperanto báyìí: cx, gx, hx, jx, sx àti ux.'
Solvu: Yanjú
Traduku: Túmọ̀
Traduku kaj respondu: Túmọ̀ kí o sì dáhùn
