Alklaku la vortojn por vidi ilian tradukon.: Egin klik hitzetan haien itzulpena ikusteko.
Forigu: Garbitu
Kompletigu la frazojn: Osatu esaldiak
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'Esperantoko letrak honela ere idatz daitezke: cx, gx, hx, jx, sx eta ux.'
Solvu: Ebatzi
Traduku: Itzuli
Traduku kaj respondu: Itzuli eta erantzun
