Alklaku la vortojn por vidi ilian tradukon.: Danna kalmomin don ganin fassararsu.
Forigu: Sake saita
Kompletigu la frazojn: Cika jimlolin
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'Haruffan Esperanto za a iya rubuta su kuma haka: cx, gx, hx, jx, sx da ux.'
Solvu: Warware
Traduku: Fassara
Traduku kaj respondu: Fassara ka amsa
