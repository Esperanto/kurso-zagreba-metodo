Alklaku la vortojn por vidi ilian tradukon.: Smelltu á orðin til að sjá þýðingu þeirra.
Forigu: Hreinsa
Kompletigu la frazojn: Ljúktu við setningarnar
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: Fyrir esperanto-stafina má líka skrifa cx, gx, hx, jx, sx og ux.
Solvu: Leystu
Traduku: Þýddu
Traduku kaj respondu: Þýddu og svaraðu
