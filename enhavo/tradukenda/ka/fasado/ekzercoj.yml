Alklaku la vortojn por vidi ilian tradukon.: დააწკაპუნეთ სიტყვებზე, რომ მათი თარგმანი ნახოთ.
Forigu: გასუფთავება
Kompletigu la frazojn: შეავსეთ წინადადებები
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'ესპერანტოს ასოები ასევე შეიძლება ასე დაიწეროს: cx, gx, hx, jx, sx და ux.'
Solvu: ამოხსნა
Traduku: თარგმნეთ
Traduku kaj respondu: თარგმნეთ და უპასუხეთ
