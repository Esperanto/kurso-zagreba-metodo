Alklaku la vortojn por vidi ilian tradukon.: ចុចលើពាក្យ ដើម្បីមើលការបកប្រែរបស់វា។
Forigu: សម្អាត
Kompletigu la frazojn: បំពេញប្រយោគ
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'អក្សរអេស្ប៉េរ៉ាន់តូក៏អាចសរសេរជា cx, gx, hx, jx, sx និង ux បានដែរ។'
Solvu: ដោះស្រាយ
Solvoj: ចម្លើយ
Traduku: បកប្រែ
Traduku kaj respondu: បកប្រែ ហើយឆ្លើយ
