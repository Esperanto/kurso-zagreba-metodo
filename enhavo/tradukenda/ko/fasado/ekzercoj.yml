Alklaku la vortojn por vidi ilian tradukon.: 클릭하시면 번역어를 볼 수 있습니다.
Forigu: 지우기
Kompletigu la frazojn: 문장을 채우세요.
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 에스페란토 특수문자는 cx, gx, hx, jx, sx, ux처럼 x를 붙여 쓸 수도 있습니다.
Solvu: 풀기
Traduku: 번역하세요.
Traduku kaj respondu: 번역하여 답하세요.
