Alklaku la vortojn por vidi ilian tradukon.: ກົດເພື່ອເບິ່ງການແປ
Forigu: ລົບ
Kompletigu la frazojn: ກະລຸນາເຮັດໃຫ້ປະໂຫຍກສົມບູນ
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'ສຳລັບຕົວອັກສອນເອສເປຣັນໂຕ ທ່ານສາມາດຂຽນແບບນີ້ໄດ້ດ້ວຍ: cx, gx, hx, jx, sx ແລະ ux.'
Solvu: ຄໍາຕອບ
Traduku: ກະລຸນາແປ
Traduku kaj respondu: ກະລຸນາແປແລະຕອບຄໍາຖາມ
