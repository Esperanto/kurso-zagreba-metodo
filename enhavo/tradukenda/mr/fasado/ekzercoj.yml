Alklaku la vortojn por vidi ilian tradukon.: शब्दांवर क्लिक करा म्हणजे त्यांचे भाषांतर दिसेल.
Forigu: पुसा
Kompletigu la frazojn: वाक्ये पूर्ण करा
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: एस्पेरान्तो अक्षरांसाठी तुम्ही cx, gx, hx, jx, sx आणि ux असेही लिहू शकता.
Solvu: सोडवा
Traduku: भाषांतर करा
Traduku kaj respondu: भाषांतर करा आणि उत्तर द्या
