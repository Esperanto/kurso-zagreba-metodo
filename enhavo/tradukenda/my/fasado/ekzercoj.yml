Alklaku la vortojn por vidi ilian tradukon.: စကားလုံးများကို နှိပ်၍ ၎င်းတို့၏ ဘာသာပြန်ကို ကြည့်ပါ။
Forigu: ပြန်စပါ
Kompletigu la frazojn: ဝါကျများကို ဖြည့်ပါ
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'အက်စပရန်တိုစာလုံးများကို ဤပုံစံဖြင့်လည်း ရေးနိုင်သည်: cx, gx, hx, jx, sx နှင့် ux။'
Solvu: ဖြေရှင်းပါ
Traduku: ဘာသာပြန်ပါ
Traduku kaj respondu: ဘာသာပြန်ပြီး ဖြေပါ
