Alklaku la vortojn por vidi ilian tradukon.: शब्दों पर क्लिक करें ताकि उनका अनुवाद दिखे।
Forigu: मिटाएँ
Kompletigu la frazojn: वाक्य पूरे करें
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'एस्पेरान्तो के अक्षर ऐसे भी लिखे जा सकते हैं: cx, gx, hx, jx, sx और ux.'
Solvu: हल करें
Traduku: अनुवाद करें
Traduku kaj respondu: अनुवाद करें और उत्तर दें
