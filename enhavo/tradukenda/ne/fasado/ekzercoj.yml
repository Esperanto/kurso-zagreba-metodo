Alklaku la vortojn por vidi ilian tradukon.: शब्दहरूको अनुवाद हेर्न शब्दमा क्लिक गर्नुहोस्।
Forigu: मेटाउनुहोस्
Kompletigu la frazojn: वाक्यहरू पूरा गर्नुहोस्
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: एस्पेरान्तोका अक्षरहरूका लागि तपाईं cx, gx, hx, jx, sx र ux पनि लेख्न सक्नुहुन्छ।
Solvu: उत्तर देखाउनुहोस्
Traduku: अनुवाद गर्नुहोस्
Traduku kaj respondu: अनुवाद गरी उत्तर दिनुहोस्
