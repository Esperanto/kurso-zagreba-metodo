Alklaku la vortojn por vidi ilian tradukon.: ਸ਼ਬਦਾਂ ਉੱਤੇ ਕਲਿੱਕ ਕਰੋ ਤਾਂ ਜੋ ਉਹਨਾਂ ਦਾ ਅਨੁਵਾਦ ਵੇਖ ਸਕੋ।
Forigu: ਮਿਟਾਓ
Kompletigu la frazojn: ਵਾਕ ਪੂਰੇ ਕਰੋ
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: ਐਸਪੇਰਾਂਤੋ ਦੇ ਅੱਖਰਾਂ ਲਈ ਤੁਸੀਂ cx, gx, hx, jx, sx ਅਤੇ ux ਵੀ ਲਿਖ ਸਕਦੇ ਹੋ।
Solvu: ਹੱਲ ਕਰੋ
Traduku: ਅਨੁਵਾਦ ਕਰੋ
Traduku kaj respondu: ਅਨੁਵਾਦ ਕਰੋ ਅਤੇ ਜਵਾਬ ਦਿਓ
