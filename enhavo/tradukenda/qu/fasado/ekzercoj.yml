Alklaku la vortojn por vidi ilian tradukon.: Simikunata ñit'iy t'ikrasqankuta qhawanaykipaq.
Forigu: Pichay
Kompletigu la frazojn: Rimaykunata hunt'achiy
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'Esperanto qillqakunata hinallataq kaynata qillqayta atinki: cx, gx, hx, jx, sx kaj ux.'
Solvu: Kutichiy
Traduku: T'ikray
Traduku kaj respondu: T'ikray hinaspa kutichiy
