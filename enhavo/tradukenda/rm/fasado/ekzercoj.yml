Alklaku la vortojn por vidi ilian tradukon.: Clicca sin ils pleds per vesair lur translaziun.
Forigu: Stizzar
Kompletigu la frazojn: Cumplettescha las frasas
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: Per las letras esperantas dastgas ti era scriver cx, gx, hx, jx, sx ed ux.
Solvu: Schliar
Traduku: Translatar
Traduku kaj respondu: Translatar e respunder
