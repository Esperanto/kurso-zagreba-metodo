Alklaku la vortojn por vidi ilian tradukon.: పదాల అనువాదం చూడడానికి వాటిపై క్లిక్ చేయండి.
Forigu: తొలగించండి
Kompletigu la frazojn: వాక్యాలను పూర్తి చేయండి
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: ఎస్పెరాంటో అక్షరాల కోసం cx, gx, hx, jx, sx, ux అని కూడా రాయవచ్చు.
Solvu: పరిష్కరించండి
Traduku: అనువదించండి
Traduku kaj respondu: అనువదించి సమాధానం ఇవ్వండి
