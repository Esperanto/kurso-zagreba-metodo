Alklaku la vortojn por vidi ilian tradukon.: Pindutin ang mga salita upang makita ang salin ng mga ito.
Forigu: Burahin
Kompletigu la frazojn: Kumpletuhin ang mga pangungusap
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: Para sa mga titik ng Esperanto, maaari mo ring isulat ang cx, gx, hx, jx, sx at ux.
Solvu: Sagutin
Traduku: Isalin
Traduku kaj respondu: Isalin at sagutin
