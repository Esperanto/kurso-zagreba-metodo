Alklaku la vortojn por vidi ilian tradukon.: الفاظ کا ترجمہ دیکھنے کے لیے کلک کریں
Forigu: دوبارہ ترتیب دیں
Kompletigu la frazojn: جملوں کو مکمل کریں
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: ایسپرانتو کے حروف کے لیے آپ cx, gx, hx, jx, sx اور ux بھی لکھ سکتے ہیں۔
Solvu: حل کریں
Traduku: ترجمہ کریں
Traduku kaj respondu: ترجمہ کریں اور جواب دیں
