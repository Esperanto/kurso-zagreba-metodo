Alklaku la vortojn por vidi ilian tradukon.: Cofa amagama ukuze ubone inguqulelo yawo.
Forigu: Sula
Kompletigu la frazojn: Gqibezela izivakalisi
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'Oonobumba be-Esperanto banokubhalwa nangolu hlobo: cx, gx, hx, jx, sx kunye ne-ux.'
Solvu: Sombulula
Traduku: Guqulela
Traduku kaj respondu: Guqulela uze uphendule
