Alklaku la vortojn por vidi ilian tradukon.: Chofoza amagama ukuze ubone ukuhumusha kwawo.
Forigu: Sula
Kompletigu la frazojn: Qedela imisho
Por la Esperantaj literoj vi ankaŭ rajtas skribi cx, gx, hx, jx, sx kaj ux.: 'Izinhlamvu ze-Esperanto zingabhalwa futhi kanje: cx, gx, hx, jx, sx no-ux.'
Solvu: Xazulula
Traduku: Humusha
Traduku kaj respondu: Humusha bese uphendula
