<ul class="pager list-unstyled align-items-center ps-0">
  {% if previous_path -%}
		<li class="previous"><a class="btn btn-secondary" href="{{previous_path}}" aria-label="{{enhavo.fasado['malantaŭen']}}" title="{{enhavo.fasado['malantaŭen']}}">◀︎</a></li>
  {%- else %}
		<li></li>
  {%- endif %} 

	{% if enhavo.lingvoj[enhavo.lingvo].komentejo %} 
		<li class="comments"><a class="btn btn-outline-secondary" href="https://github.com/Esperanto/kurso-zagreba-metodo/discussions/categories/{{enhavo.lingvo}}" target="_blank" rel="noopener">{{enhavo.fasado['Komentejo']}}</a></li>
  {%- else %}
		<li></li>
  {%- endif %} 

  {% if next_path -%}
		<li class="next"><a class="btn btn-primary" href="{{next_path}}" aria-label="{{enhavo.fasado['antaŭen']}}" title="{{enhavo.fasado['antaŭen']}}">▶︎</a></li>
  {%- else %}
		<li></li>
  {%- endif %} 
</ul>
