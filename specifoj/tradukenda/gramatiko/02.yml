- temo: Adjektivoj je -a
  subtemoj:
  - Adjektivoj finiĝas per -a.
  - Ili akordiĝas kun substantivo per -j kaj -n.
  ekzemploj:
  - bona amiko
  - bonaj amikoj
- temo: Kazoj
  subtemoj:
  - Nominativo kaj akuzativo.
  - Aliaj rilatoj normale uziĝas per prepozicioj.
  ekzemploj:
  - libro
  - libron
- temo: Akuzativo je -n
  subtemoj:
  - Rekta objekto.
  - Ne uzu akuzativon post esti.
  ekzemploj:
  - bonajn amikojn
  - Mi vidas amikon.
- temo: Konjugacio
  subtemoj:
  - Infinitivo -i.
  - Prezenco -as, preterito -is, futuro -os.
  - La finaĵo estas sama por ĉiuj personoj.
  ekzemploj:
  - skribi
  - laboras
  - laboris
  - laboros
- temo: Ke
  subtemoj:
  - Ke enkondukas subfrazon.
  - Ne konfuzu ke kun kio.
  ekzemploj:
  - Mi vidas, ke vi manĝas.
  - Li diras, ke li iros.
- temo: Prefikso mal-
  subtemoj:
  - Kontraŭa signifo.
  ekzemploj:
  - malbona
  - malfacila
  - maljuna
- temo: Prefikso ge-
  subtemoj:
  - Personoj de ambaŭ seksoj kune.
  ekzemploj:
  - gepatroj
  - gefratoj
- temo: Vortfarado per konataj radikoj
  subtemoj:
  - Prepozicioj kaj radikoj povas funkcii kiel partoj de kunmetaĵoj.
  - Kompreno de kunmetaĵoj gravas por traduk-ekzercoj.
  ekzemploj:
  - eniri
  - alveni
  - kunlabori
- temo: Ĝentilaj esprimoj
  subtemoj:
  - Oftaj bazaj esprimoj por saluto, peto kaj danko.
  ekzemploj:
  - saluton
  - bonvolu
  - dankon
- temo: Vortordo
  subtemoj:
  - Normala ordo estas subjekto, verbo, objekto.
  - La akuzativo permesas emfazajn ŝanĝojn.
  ekzemploj:
  - Mi legas libron.
  - Libron mi legas.
- temo: Fruaj k-demandoj
  subtemoj:
  - Kio kaj kion.
  - Kia kaj kiaj.
  - Kiu kaj kiujn.
  ekzemploj:
  - Kion faris Ana?
  - Kia estis via hejmo?
  - Kiujn librojn vi legis?
