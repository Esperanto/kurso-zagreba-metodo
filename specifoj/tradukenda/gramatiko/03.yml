- temo: Adverboj je -e
  subtemoj:
  - Adverboj finiĝas per -e.
  - Ili priskribas manieron aŭ cirkonstancon.
  ekzemploj:
  - rapide
  - malmulte
- temo: Prepozicioj per kaj kun
  subtemoj:
  - Per montras rimedon aŭ ilon.
  - Kun montras kunecon.
  ekzemploj:
  - per libro
  - kun amiko
- temo: Prepozicio post
  subtemoj:
  - Post montras tempon aŭ lokon malantaŭ io en sinsekvo.
  ekzemploj:
  - post la manĝo
- temo: Prepozicio malantaŭ
  subtemoj:
  - Malantaŭ montras lokon malantaŭ io.
  - Ĝi estas mal- plus antaŭ.
  ekzemploj:
  - malantaŭ la domo
- temo: Tra kaj antaŭ en kunmetaĵoj
  subtemoj:
  - Prepozicioj povas aperi kiel radikoj en kunmetitaj vortoj.
  - Antaŭ kaj tra bezonas klaran distingon.
  ekzemploj:
  - antaŭĉambro
  - antaŭvidi
  - trarigardi
  - tralegi
- temo: Sufikso -ul
  subtemoj:
  - Persono karakterizata de eco aŭ rilato.
  ekzemploj:
  - junulo
  - malriĉulo
- temo: Sufikso -ej
  subtemoj:
  - Loko destinita por ago aŭ afero.
  ekzemploj:
  - laborejo
  - lernejo
- temo: Sufikso -ebl
  subtemoj:
  - Eblo aŭ taŭgeco por ago.
  ekzemploj:
  - trinkebla
  - travidebla
- temo: Imperativo
  subtemoj:
  - Verba finaĵo -u por ordono, peto aŭ invito.
  ekzemploj:
  - venu
  - ni vidu
- temo: Lokaj kaj manieraj k-vortoj
  subtemoj:
  - Kie demandas pri loko.
  - Kiel demandas pri maniero.
  - Kiuj povas ligi subfrazon al antaŭa substantivo.
  ekzemploj:
  - Kie vi vidis?
  - Kiel okazis?
  - la junuloj, kiuj portis tablon
