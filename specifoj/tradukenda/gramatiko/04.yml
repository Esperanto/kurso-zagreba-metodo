- temo: Nombroj
  subtemoj:
  - Bazaj kaj kombinitaj nombroj.
  - Nombroj en kunmetaĵoj kaj adjektivoj.
  ekzemploj:
  - okdek ses
  - dumil tri
  - dektaga
  - trilingva
- temo: Direkta akuzativo
  subtemoj:
  - -n povas montri direkton post loka prepozicio.
  - Distingu loko de movo al loko.
  ekzemploj:
  - en la ĉambro
  - en la ĉambron
- temo: Pronomo oni
  subtemoj:
  - Oni montras nedifinitan personon aŭ homojn ĝenerale.
  ekzemploj:
  - Oni manĝas.
  - Oni sidas.
- temo: Refleksiva pronomo si
  subtemoj:
  - Si rilatas al la subjekto de la frazo.
  - La akuzativa formo estas sin.
  ekzemploj:
  - Li lavas sin.
  - Ili rigardas sin.
- temo: Tempaj kaj direktaj k-vortoj
  subtemoj:
  - Kiam por tempo.
  - Kiom longe por daŭro.
  - Kie kaj kien por loko kaj direkto.
  ekzemploj:
  - Kiam mi revidos vin?
  - Kiom longe vi lernas?
  - Kien vi iros?
- temo: Subfrazoj per kiam kaj se
  subtemoj:
  - Kiam povas enkonduki tempan subfrazon.
  - Se povas enkonduki realan kondiĉon.
  ekzemploj:
  - kiam estas malvarme
  - se oni forprenas monon
- temo: Prefikso re-
  subtemoj:
  - Denove aŭ reen.
  ekzemploj:
  - reiri
  - revidi
  - reveni
- temo: En kaj el en kunmetaĵoj
  subtemoj:
  - En kaj el montras direkton aŭ devenon en kunmetitaj verboj.
  ekzemploj:
  - enfali
  - enmeti
  - ellabori
  - elpreni
