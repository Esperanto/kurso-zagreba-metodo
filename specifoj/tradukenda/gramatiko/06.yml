- temo: U-formo en subfrazoj
  subtemoj:
  - -u aperas post ke ĉe volo, deziro, ordono aŭ peto.
  ekzemploj:
  - Mi deziras, ke vi venu.
  - Ĉu vi volas, ke mi montru?
- temo: Prepozicio je
  subtemoj:
  - Je estas ĝenerala prepozicio kiam alia ne taŭgas.
  - Ĝi ofte aperas ĉe horoj.
  ekzemploj:
  - je la kvina horo
- temo: Verbo farti
  subtemoj:
  - Farti demandas aŭ priskribas staton.
  ekzemploj:
  - Kiel vi fartas?
- temo: Sufikso -et
  subtemoj:
  - Malgrandigo aŭ mildigo.
  ekzemploj:
  - libreto
  - iomete
- temo: Sufikso -eg
  subtemoj:
  - Pligrandigo aŭ intensigo.
  ekzemploj:
  - bonege
  - varmega
- temo: Sufikso -iĝ
  subtemoj:
  - Fariĝo aŭ ŝanĝiĝo de la subjekto.
  ekzemploj:
  - nomiĝi
  - ruĝiĝi
- temo: Rilataj subfrazoj per kiu
  subtemoj:
  - Kiu aŭ kiun povas ligi subfrazon al antaŭa substantivo.
  - La formo ricevas -n kiam ĝi estas objekto en la subfrazo.
  ekzemploj:
  - la libreto, kiun mi sendis
- temo: Foj-vortoj
  subtemoj:
  - Foj montras okazon aŭ ripeton.
  - Nombroj kaj kvantaj vortoj povas kuniĝi kun foj.
  ekzemploj:
  - dufoje
  - multfoje
- temo: Kunmetaĵoj por ĉiutagaj agoj
  subtemoj:
  - Jam konataj radikoj restas atendata legokapablo en la ekzercoj.
  ekzemploj:
  - matenmanĝi
  - leterportisto
  - hejmlando
