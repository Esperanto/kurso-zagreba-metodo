- temo: Prepozicio da
  subtemoj:
  - Da staras post kvanta esprimo.
  - Da ne egalas al posed-rilata de.
  ekzemploj:
  - iom da kafo
  - glaso da akvo
- temo: Sufikso -ig
  subtemoj:
  - Kaŭzado aŭ igi ion fariĝi tia.
  - Distingu -ig de -iĝ.
  ekzemploj:
  - purigi
  - loĝigi
  - memorigi
- temo: Sufikso -aĉ
  subtemoj:
  - Malbona aŭ malŝatata kvalito.
  ekzemploj:
  - domaĉo
- temo: Demandoj kun prepozicio plus kiu
  subtemoj:
  - Prepozicio povas stari antaŭ kiu.
  - La prepozicio portas la rilaton, ne aparta kazo.
  ekzemploj:
  - Al kiu vi donis?
  - Kontraŭ kiu ludis?
- temo: Neni-vortoj
  subtemoj:
  - Neni-vortoj jam neas la frazon.
  - Ne aldonu duoblan neadon.
  ekzemploj:
  - nenion
- temo: Sub, super, trans, de kaj for en kunmetaĵoj
  subtemoj:
  - Tiuj radikoj aperas kiel vortfaraj elementoj en la ekzercoj.
  ekzemploj:
  - subteni
  - superrigardo
  - transdoni
  - forigi
