- temo: Sufikso -an
  subtemoj:
  - Membro, loĝanto aŭ ano de grupo.
  ekzemploj:
  - klubano
  - amerikano
- temo: Sufikso -ec
  subtemoj:
  - Eco aŭ abstrakta kvalito.
  ekzemploj:
  - neŭtraleco
  - ebleco
- temo: Sufikso -uj
  subtemoj:
  - Ujo, arbo aŭ tradicia landonomo.
  ekzemploj:
  - monujo
  - pomujo
- temo: Kontrasto inter -ig kaj -iĝ
  subtemoj:
  - -ig montras kaŭzadon aŭ igon.
  - -iĝ montras fariĝon aŭ ŝanĝiĝon de la subjekto.
  ekzemploj:
  - anstataŭigi
  - finiĝi
  - informiĝi
- temo: Rilat, part, temp kaj flank en kunmetaĵoj
  subtemoj:
  - Tiuj radikoj aperas en ekzercoj kiel vortfaraj elementoj.
  ekzemploj:
  - tiurilate
  - partopreni
  - samtempe
  - plejparte
