- temo: Sufikso -il
  subtemoj:
  - Ilo aŭ rimedo por ago.
  ekzemploj:
  - malfermilo
  - muzikilo
  - ŝlosilo
- temo: Sufikso -estr
  subtemoj:
  - Ĉefo aŭ respondeculo pri grupo aŭ afero.
  - Povas kombiniĝi kun -ar.
  ekzemploj:
  - estraro
- temo: Kombinado de sufiksoj
  subtemoj:
  - Jam lernitaj sufiksoj povas aperi kune en unu vorto.
  ekzemploj:
  - manĝilaro
  - sanigilo
- temo: Mez, tag, nokt, flank kaj punkt en kunmetaĵoj
  subtemoj:
  - Tiuj radikoj formas tempajn kaj rilatajn esprimojn.
  ekzemploj:
  - tagmeze
  - posttagmeze
  - noktomezo
  - vidpunkto
  - aliflanke
