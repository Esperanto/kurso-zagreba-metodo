- temo: Ju ... des
  subtemoj:
  - Ju staras en la unua parto.
  - Des staras en la dua parto.
  ekzemploj:
  - ju pli longe
  - des pli malvarme
- temo: Ajn
  subtemoj:
  - Ajn igas tabelvorton nedifinita aŭ libera.
  - Ajn povas stari post kie, kiam, iu kaj aliaj tabelvortoj.
  ekzemploj:
  - kie ajn
  - kiam ajn
  - iu ajn
- temo: Prefikso dis-
  subtemoj:
  - Dis montras disigon aŭ disdonon.
  ekzemploj:
  - disdoni
  - dissendi
- temo: Sufikso -on
  subtemoj:
  - Frakcio aŭ parto.
  - Povas formi substantivojn, adjektivojn kaj pliajn derivaĵojn.
  ekzemploj:
  - dekono
  - duono
  - kvarona
  - duonigi
- temo: Rekombinado ĉe fina ripeto
  subtemoj:
  - Re-, ĉi-, -aĵ, -aĉ kaj -ig plu aperas en ekzercoj.
  ekzemploj:
  - prezentaĵo
  - skribaĉi
  - pretigi
  - ĉiumomente
  - retrovi
